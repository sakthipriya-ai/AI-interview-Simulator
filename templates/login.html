<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#6366f1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/signup">Create account</a>

</div>

</body>
</html>
