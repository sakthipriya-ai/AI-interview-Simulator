<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Background */
body{
display:flex;
height:100vh;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
}

/* Sidebar */
.sidebar{
width:240px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(15px);
padding:25px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
margin:10px 0;
color:white;
text-decoration:none;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.15);
transform:translateX(5px);
}

/* Main */
.main{
flex:1;
padding:40px;
overflow:auto;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

.card h1{
font-size:38px;
}

/* Layout */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
margin-top:40px;
}

/* Chart Box */
.chart-box{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 8px 25px rgba(0,0,0,0.2);
height:300px; /* smaller chart */
}

/* Form */
.form-box{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* Inputs */
select, button{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:none;
}

/* Button */
button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16a34a;
transform:scale(1.05);
}

/* Heading */
h1{
font-size:30px;
}

/* Fade animation */
.card, .chart-box, .form-box{
animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>🚀 AI Platform</h2>

<a href="/dashboard">🏠 Dashboard</a>
<a href="/resume">📄 Resume Analyzer</a>
<a href="/analytics">📊 Analytics</a>
<a href="/chatbot">🤖 AI Chatbot</a>
<a href="/logout">🚪 Logout</a>
</div>

<!-- Main -->
<div class="main">

<h1>Welcome {{user}} 👋</h1>

<!-- Cards -->
<div class="cards">

<div class="card">
<h1>{{avg_score}}</h1>
<p>Average Score</p>
</div>

<div class="card">
<h1>{{scores|length}}</h1>
<p>Total Interviews</p>
</div>

<div class="card">
<h1>AI</h1>
<p>Career Assistant</p>
</div>

</div>

<!-- Grid -->
<div class="grid">

<!-- Chart -->
<div class="chart-box">
<h3>📊 Performance</h3>
<canvas id="scoreChart"></canvas>
</div>

<!-- Interview -->
<div class="form-box">

<h3>🎯 Start Interview</h3>

<form action="/interview" method="POST">
<select name="role">
<option value="software engineer">Software Engineer</option>
<option value="data scientist">Data Scientist</option>
</select>

<button>Start Interview</button>
</form>

</div>

</div>

</div>

<!-- Chart Script -->
<script>

const scores = {{ scores | tojson | safe }};

// calculate avg safely
let avg = 0;

if(scores.length > 0){
let total = scores.reduce((a,b)=>a+b,0);
avg = total / scores.length;
}

// smaller chart
const ctx = document.getElementById('scoreChart');

new Chart(ctx, {
type: 'doughnut',  // nicer than pie
data: {
labels: ["Score","Remaining"],
datasets: [{
data: [avg, 100-avg]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
labels:{color:"white"}
}
}
}
});

</script>

</body>
</html>
